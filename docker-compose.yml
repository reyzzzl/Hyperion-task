version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull mistral
        tail -f /dev/null
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_MODEL=mistral
      - LLM_BACKEND=ollama
      - DASHBOARD_API_TOKEN=hyperion-secret
    depends_on:
      - ollama
    volumes:
      - ./tasks.db:/app/tasks.db
      - ./token.pickle:/app/token.pickle
      - ./credentials.json:/app/credentials.json
volumes:
  ollama_data: