version: '3.8'

networks:
  hyperion_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis_data:
  ollama_data:
  app_data:

services:
  redis:
    image: redis:7-alpine
    container_name: hyperion_redis
    restart: always
    networks:
      - hyperion_network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1 --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  ollama:
    image: ollama/ollama:latest
    container_name: hyperion_ollama
    restart: always
    networks:
      - hyperion_network
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      OLLAMA_PID=$!
      sleep 8 &&
      ollama pull ${OLLAMA_MODEL} &&
      wait $OLLAMA_PID
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyperion_app
    restart: always
    networks:
      - hyperion_network
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      - DASHBOARD_API_TOKEN=${DASHBOARD_API_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKFLOW_DEPTH_LIMIT=${WORKFLOW_DEPTH_LIMIT:-5}
      - TIMEZONE=${TIMEZONE:-UTC}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - NOTION_API_TOKEN=${NOTION_API_TOKEN:-}
      - NOTION_DB_ORDERS=${NOTION_DB_ORDERS:-}
      - NOTION_DB_TICKETS=${NOTION_DB_TICKETS:-}
      - NOTION_DB_TRANSACTIONS=${NOTION_DB_TRANSACTIONS:-}
      - NOTION_DB_INVENTORY=${NOTION_DB_INVENTORY:-}
      - MS365_TENANT_ID=${MS365_TENANT_ID:-}
      - MS365_CLIENT_ID=${MS365_CLIENT_ID:-}
      - MS365_CLIENT_SECRET=${MS365_CLIENT_SECRET:-}
    volumes:
      - app_data:/app/data
      - ./credentials.json:/app/credentials.json:ro
      - ./token.pickle:/app/token.pickle:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M