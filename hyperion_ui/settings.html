<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Hyperion Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/settings.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">
    <div class="flex h-screen">
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-md">
            <div class="p-4 text-xl font-bold text-blue-600 border-b">Hyperion Task</div>
            <nav class="mt-6">
                <a href="dashboard.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
                <a href="workflows.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Workflows</a>
                <a href="executions.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Executions</a>
                <a href="settings.html" class="block py-2 px-4 bg-gray-100 dark:bg-gray-700 text-blue-600">Settings</a>
                <a href="#" onclick="logout()" class="block py-2 px-4 text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">Logout</a>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold mb-6">Settings</h1>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-6">
                <div>
                    <h2 class="text-xl font-semibold mb-4">Profile</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Name</label>
                            <input type="text" id="profileName" class="w-full max-w-md px-3 py-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Email</label>
                            <input type="email" id="profileEmail" class="w-full max-w-md px-3 py-2 border rounded-lg">
                        </div>
                        <button id="updateProfileBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Update Profile</button>
                    </div>
                </div>
                <div class="border-t pt-6">
                    <h2 class="text-xl font-semibold mb-4">API Keys</h2>
                    <button id="generateApiKeyBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Generate New API Key</button>
                    <div id="apiKeysList" class="mt-4 space-y-2"></div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
