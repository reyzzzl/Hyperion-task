<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executions - Hyperion Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/executions.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">
    <div class="flex h-screen">
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-md">
            <div class="p-4 text-xl font-bold text-blue-600 border-b">Hyperion Task</div>
            <nav class="mt-6">
                <a href="dashboard.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
                <a href="workflows.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Workflows</a>
                <a href="executions.html" class="block py-2 px-4 bg-gray-100 dark:bg-gray-700 text-blue-600">Executions</a>
                <a href="settings.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Settings</a>
                <a href="#" onclick="logout()" class="block py-2 px-4 text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">Logout</a>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold mb-6">Executions</h1>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-gray-50 dark:bg-gray-700">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Workflow</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Started</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Duration</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Errors</th>
                        </tr>
                    </thead>
                    <tbody id="executionsTable" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
