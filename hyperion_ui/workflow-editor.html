<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Editor - Hyperion Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/workflow-editor.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">
    <div class="flex h-screen">
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-md">
            <div class="p-4 text-xl font-bold text-blue-600 border-b">Hyperion Task</div>
            <nav class="mt-6">
                <a href="dashboard.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
                <a href="workflows.html" class="block py-2 px-4 bg-gray-100 dark:bg-gray-700 text-blue-600">Workflows</a>
                <a href="executions.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Executions</a>
                <a href="settings.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Settings</a>
                <a href="#" onclick="logout()" class="block py-2 px-4 text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">Logout</a>
            </nav>
        </aside>
        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold mb-6">Workflow Editor</h1>
            <form id="workflowForm" class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 space-y-4">
                <input type="hidden" id="workflowId">
                <div>
                    <label class="block text-sm font-medium mb-1">Name</label>
                    <input type="text" id="name" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Description</label>
                    <textarea id="description" rows="2" class="w-full px-3 py-2 border rounded-lg"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Workflow Definition (JSON)</label>
                    <textarea id="definition" rows="15" class="w-full font-mono text-sm px-3 py-2 border rounded-lg" placeholder='{"nodes": [], "edges": []}'></textarea>
                    <p class="text-xs text-gray-500 mt-1">Define your workflow nodes and connections in JSON format.</p>
                </div>
                <div class="flex justify-end space-x-2">
                    <a href="workflows.html" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</a>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save</button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
