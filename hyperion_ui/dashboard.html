<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hyperion Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js" defer></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white dark:bg-gray-800 shadow-md">
            <div class="p-4 text-xl font-bold text-blue-600 border-b">Hyperion Task</div>
            <nav class="mt-6">
                <a href="dashboard.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Dashboard</a>
                <a href="workflows.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Workflows</a>
                <a href="executions.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Executions</a>
                <a href="settings.html" class="block py-2 px-4 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">Settings</a>
                <a href="#" onclick="logout()" class="block py-2 px-4 text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">Logout</a>
            </nav>
        </aside>
        <!-- Main -->
        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
            <div id="stats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div id="recentExecutions" class="bg-white dark:bg-gray-800 rounded-lg shadow p-4"></div>
                <div id="recentWorkflows" class="bg-white dark:bg-gray-800 rounded-lg shadow p-4"></div>
            </div>
        </main>
    </div>
</body>
</html>
